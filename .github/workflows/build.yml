# Icons PNG
def make_icon(size):
    def chunk(name, data):
        c = zlib.crc32(name+data)&0xffffffff
        return struct.pack('>I',len(data))+name+data+struct.pack('>I',c)
    ihdr = struct.pack('>IIBBBBB',size,size,8,2,0,0,0)
    raw = b''
    m = size//6
    for y in range(size):
        raw += b'\x00'
        for x in range(size):
            raw += bytes([174,208,0]) if (x<m or x>=size-m or y<m or y>=size-m) else bytes([13,13,13])
    png = b'\x89PNG\r\n\x1a\n'
    png += chunk(b'IHDR',ihdr)
    png += chunk(b'IDAT',zlib.compress(raw))
    png += chunk(b'IEND',b'')
    return png

for folder, size in [('mipmap-mdpi',48),('mipmap-hdpi',72),
                     ('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
    data = make_icon(size)
    wb(f'app/src/main/res/{folder}/ic_launcher.png', data)
    wb(f'app/src/main/res/{folder}/ic_launcher_round.png', data)

print("SEMUA FILE BERES!")
PYEOF

      - name: Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          gradle wrapper
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: Darwati-Chenel-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
