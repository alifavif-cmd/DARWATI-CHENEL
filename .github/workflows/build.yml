name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Buat semua file project
        run: |
          python3 - << 'PYEOF'
import os, struct, zlib, textwrap

def w(path, content):
    os.makedirs(os.path.dirname(path), exist_ok=True)
    open(path, 'w').write(textwrap.dedent(content).lstrip('\n'))

def wb(path, data):
    os.makedirs(os.path.dirname(path), exist_ok=True)
    open(path, 'wb').write(data)

APP_URL  = "https://alifavif-cmd.github.io/DARWATI-CHENEL/"
APP_NAME = "Darwati Chenel"
APP_PKG  = "com.darwatichernel.app"

# settings.gradle
w('settings.gradle', """
    rootProject.name = "DarwatiChenel"
    include ':app'
""")

# build.gradle (root)
w('build.gradle', """
    buildscript {
        repositories { google(); mavenCentral() }
        dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
    }
    allprojects { repositories { google(); mavenCentral() } }
""")

# gradle.properties
w('gradle.properties', """
    android.useAndroidX=true
    android.enableJetifier=true
    org.gradle.jvmargs=-Xmx2048m
    org.gradle.daemon=false
""")

# app/build.gradle
w('app/build.gradle', f"""
    plugins {{ id 'com.android.application' }}
    android {{
        namespace "{APP_PKG}"
        compileSdk 34
        defaultConfig {{
            applicationId "{APP_PKG}"
            minSdk 21
            targetSdk 34
            versionCode 1
            versionName "1.0"
        }}
        buildTypes {{ debug {{ minifyEnabled false }} }}
        compileOptions {{
            sourceCompatibility JavaVersion.VERSION_1_8
            targetCompatibility JavaVersion.VERSION_1_8
        }}
    }}
    dependencies {{
        implementation 'androidx.appcompat:appcompat:1.6.1'
    }}
""")

# AndroidManifest.xml
w('app/src/main/AndroidManifest.xml', f"""
    <?xml version="1.0" encoding="utf-8"?>
    <manifest xmlns:android="http://schemas.android.com/apk/res/android">
        <uses-permission android:name="android.permission.INTERNET"/>
        <uses-permission android:name="android.permission.RECORD_AUDIO"/>
        <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
        <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
        <uses-permission android:name="android.permission.WAKE_LOCK"/>
        <uses-feature android:name="android.hardware.microphone" android:required="false"/>
        <application
            android:allowBackup="false"
            android:icon="@mipmap/ic_launcher"
            android:roundIcon="@mipmap/ic_launcher_round"
            android:label="{APP_NAME}"
            android:usesCleartextTraffic="true"
            android:hardwareAccelerated="true">
            <activity
                android:name=".MainActivity"
                android:exported="true"
                android:screenOrientation="portrait"
                android:configChanges="orientation|screenSize">
                <intent-filter>
                    <action android:name="android.intent.action.MAIN"/>
                    <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
            </activity>
        </application>
    </manifest>
""")

# MainActivity.java
w(f'app/src/main/java/{APP_PKG.replace(".","/")}/MainActivity.java', f"""
    package {APP_PKG};
    import android.Manifest;
    import android.annotation.SuppressLint;
    import android.content.pm.PackageManager;
    import android.os.Build;
    import android.os.Bundle;
    import android.view.KeyEvent;
    import android.view.WindowManager;
    import android.webkit.PermissionRequest;
    import android.webkit.WebChromeClient;
    import android.webkit.WebSettings;
    import android.webkit.WebView;
    import android.webkit.WebViewClient;
    import androidx.annotation.NonNull;
    import androidx.appcompat.app.AppCompatActivity;
    import androidx.core.app.ActivityCompat;
    import androidx.core.content.ContextCompat;
    public class MainActivity extends AppCompatActivity {{
        private WebView wv;
        private static final int MIC = 1001;
        private PermissionRequest pendingReq;
        @SuppressLint("SetJavaScriptEnabled")
        @Override protected void onCreate(Bundle s) {{
            super.onCreate(s);
            getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
            if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO)
                    != PackageManager.PERMISSION_GRANTED)
                ActivityCompat.requestPermissions(this,
                    new String[]{{Manifest.permission.RECORD_AUDIO,
                                  Manifest.permission.MODIFY_AUDIO_SETTINGS}}, MIC);
            wv = new WebView(this);
            setContentView(wv);
            WebSettings ws = wv.getSettings();
            ws.setJavaScriptEnabled(true);
            ws.setDomStorageEnabled(true);
            ws.setDatabaseEnabled(true);
            ws.setMediaPlaybackRequiresUserGesture(false);
            ws.setUseWideViewPort(true);
            ws.setLoadWithOverviewMode(true);
            if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP)
                ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
            wv.setWebViewClient(new WebViewClient());
            wv.setWebChromeClient(new WebChromeClient() {{
                @Override public void onPermissionRequest(PermissionRequest req) {{
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {{
                        if (ContextCompat.checkSelfPermission(MainActivity.this,
                                Manifest.permission.RECORD_AUDIO)
                                == PackageManager.PERMISSION_GRANTED)
                            req.grant(req.getResources());
                        else {{ pendingReq = req;
                            ActivityCompat.requestPermissions(MainActivity.this,
                                new String[]{{Manifest.permission.RECORD_AUDIO}}, MIC); }}
                    }}
                }}
            }});
            wv.setLayerType(WebView.LAYER_TYPE_HARDWARE, null);
            wv.loadUrl("{APP_URL}");
        }}
        @Override public void onRequestPermissionsResult(int code,
                @NonNull String[] p, @NonNull int[] r) {{
            super.onRequestPermissionsResult(code, p, r);
            if (code == MIC && r.length > 0 && r[0] == PackageManager.PERMISSION_GRANTED
                    && pendingReq != null
                    && Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {{
                pendingReq.grant(pendingReq.getResources());
                pendingReq = null;
            }}
        }}
        @Override public boolean onKeyDown(int k, KeyEvent e) {{
            if (k == KeyEvent.KEYCODE_BACK && wv.canGoBack()) {{ wv.goBack(); return true; }}
            return super.onKeyDown(k, e);
        }}
        @Override protected void onResume()  {{ super.onResume();  wv.onResume();  wv.resumeTimers(); }}
        @Override protected void onPause()   {{ super.onPause();   wv.onPause();   wv.pauseTimers(); }}
        @Override protected void onDestroy() {{ if(wv!=null) wv.destroy(); super.onDestroy(); }}
    }}
""")

# strings.xml
w('app/src/main/res/values/strings.xml', f"""
    <?xml version="1.0" encoding="utf-8"?>
    <resources>
        <string name="app_name">{APP_NAME}</string>
    </resources>
""")

