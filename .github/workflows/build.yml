name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O g.zip
          unzip -q g.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Create Project
        run: echo "" | base64 -d | python3

      - name: Build APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: APK-Darwati-Chenel
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
